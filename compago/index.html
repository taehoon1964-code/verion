<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>COMPAGO · VERION</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;font-family:'Segoe UI','Malgun Gothic',sans-serif}
  iframe{border:0;width:100%;height:100vh;display:block;background:#0e3b34}
  #loader{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;
    background:
      radial-gradient(760px 520px at 12% -8%, rgba(255,255,255,.14), transparent 55%),
      radial-gradient(900px 640px at 105% 108%, rgba(18,64,170,.55), transparent 60%),
      radial-gradient(680px 480px at 96% 0%, rgba(28,200,180,.24), transparent 55%),
      linear-gradient(125deg,#16ab8d 0%,#1a91c4 47%,#2160cf 100%);
    transition:opacity .5s ease;opacity:1}
  #loader.hide{opacity:0;pointer-events:none}
  #loader .wm{font-weight:900;letter-spacing:9px;font-size:46px;line-height:1;
    background:linear-gradient(100deg,#e7c879,#ffffff 55%,#bfeee2);-webkit-background-clip:text;background-clip:text;
    -webkit-text-fill-color:transparent;color:transparent}
  #loader .sub{color:rgba(255,255,255,.85);font-size:12px;letter-spacing:5px;font-weight:800;margin-top:-6px}
  #loader .sp{width:46px;height:46px;border:4px solid rgba(255,255,255,.28);border-top-color:#fff;border-radius:50%;
    animation:cpSpin .8s linear infinite;margin-top:8px}
  @keyframes cpSpin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
  <div id="loader">
    <div class="wm">COMPAGO</div>
    <div class="sub">VERION 통합 업무 플랫폼</div>
    <div class="sp"></div>
  </div>
  <iframe id="app" allow="clipboard-write; clipboard-read"></iframe>
  <script>
    var EXEC = 'https://script.google.com/a/verion.kr/macros/s/AKfycbxqH4dp9HtllNiojsy0EBJZFf4mkCeiOjTYOt-azoOeC3JNTVssEpg2jEnfHe6s131z/exec';
    var app = document.getElementById('app');
    var loader = document.getElementById('loader');
    var failsafe;
    function showLoader(){ loader.classList.remove('hide'); clearTimeout(failsafe); failsafe = setTimeout(hideLoader, 8000); }
    function hideLoader(){ loader.classList.add('hide'); clearTimeout(failsafe); }
    app.addEventListener('load', function(){ setTimeout(hideLoader, 300); });
    function loadFromSearch(){ showLoader(); app.src = EXEC + (location.search || ''); }
    loadFromSearch();
    window.addEventListener('message', function (e) {
      var d = e.data || {};
      if (d.compagoNav) { var s = d.search || ''; try { history.pushState({}, '', location.pathname + s); } catch (_e) {} showLoader(); app.src = EXEC + s; return; }
      if (d.compagoHome) { if (location.search) { try { history.pushState({}, '', location.pathname); } catch (_e) {} } showLoader(); app.src = EXEC; return; }
    });
    window.addEventListener('popstate', loadFromSearch);
  </script>
</body>
</html>
