<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>COMPAGO · VERION</title>
<style>
  html,body{margin:0;height:100%;background:#0e3b34;overflow:hidden}
  iframe{border:0;width:100%;height:100vh;display:block}
</style>
</head>
<body>
  <iframe id="app" allow="clipboard-write; clipboard-read"></iframe>
  <script>
    var EXEC = 'https://script.google.com/a/verion.kr/macros/s/AKfycbxqH4dp9HtllNiojsy0EBJZFf4mkCeiOjTYOt-azoOeC3JNTVssEpg2jEnfHe6s131z/exec';
    var app = document.getElementById('app');
    function loadFromSearch(){ app.src = EXEC + (location.search || ''); }
    loadFromSearch();
    window.addEventListener('message', function (e) {
      var d = e.data || {};
      if (d.compagoNav) {
        var s = d.search || '';
        try { history.pushState({}, '', location.pathname + s); } catch (_e) {}
        app.src = EXEC + s;
        return;
      }
      if (d.compagoHome) {
        if (location.search) { try { history.pushState({}, '', location.pathname); } catch (_e) {} }
        app.src = EXEC;
        return;
      }
    });
    window.addEventListener('popstate', loadFromSearch);
  </script>
</body>
</html>
