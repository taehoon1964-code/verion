<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>COMPAGO · VERION</title>
<style>
  html,body{margin:0;height:100%;background:linear-gradient(165deg,#0e3b34,#0a1f3d);color:#eaf5f0;
    font-family:'Segoe UI','Malgun Gothic',sans-serif}
  .wrap{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center;padding:20px}
  .logo{font-size:46px;font-weight:900;letter-spacing:8px;

  .sub{font-size:13px;letter-spacing:3px;color:#9fc4b8;font-weight:700}
  .msg{margin-top:18px;font-size:14px;color:#bcd6cd}
  .spin{width:26px;height:26px;border:3px solid rgba(255,255,255,.2);border-top-color:#7fd8c0;border-radius:50%;animation:s 1s linear infinite;margin-top:6px}
  @keyframes s{to{transform:rotate(360deg)}}
  a{color:#7fd8c0}
</style>
</head>
<body>
  <div class="wrap">
    <div class="logo">COMPAGO</div>
    <div class="sub">VERION 통합 업무 플랫폼</div>
    <div class="spin"></div>
    <div class="msg">COMPAGO를 여는 중입니다…</div>
    <noscript><p class="msg"><a href="https://script.google.com/a/verion.kr/macros/s/AKfycbxqH4dp9HtllNiojsy0EBJZFf4mkCeiOjTYOt-azoOeC3JNTVssEpg2jEnfHe6s131z/exec">여기를 눌러 COMPAGO 열기</a></p></noscript>
  </div>
  <script>
    // COMPAGO 웹앱(Apps Script) 실행 URL — 워크스페이스(verion.kr) 스코프
    var EXEC = "https://script.google.com/a/verion.kr/macros/s/AKfycbxqH4dp9HtllNiojsy0EBJZFf4mkCeiOjTYOt-azoOeC3JNTVssEpg2jEnfHe6s131z/exec";
    // verion.ai.kr/compago?view=feed 처럼 넘어온 쿼리스트링을 그대로 전달
    var qs = window.location.search || "";
    window.location.replace(EXEC + qs);
  </script>
</body>
</html>
